<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="messages">
        <!-- MESSAGES -->
    </div>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            color: #e1e1e1;
            display: inline-block;
        }

        .messages {
            display: inline-flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
        }

        .message {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 10px;
            max-width: 100%;
        }

        .reply {
            color: #777777;
            border-style: solid;
            border-color: aliceblue;
            border-width: 0px;
            border-left-width: 4px;
            padding-left: 4px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
            background-color: #5865f2;
            margin-top: 2px;
        }

        .message-content {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .bubble {
            background-color: #1e1e2e;
            border-radius: 12px;
            border-top-left-radius: 4px;
            padding: 8px 12px;
            max-width: 100%;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .displayname {
            font-weight: 600;
            font-size: 14px;
            color: #ffffff;
        }

        .timestamp {
            font-size: 11px;
            color: #72767d;
        }

        .message-body {
            margin-top: 2px;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message-body a {
            color: #00aff4;
            text-decoration: none;
        }

        .message-body a:hover {
            text-decoration: underline;
        }

        .notice {
            color: #a0a0a0;
            font-style: italic;
        }

        .message-image img {
            max-width: 300px;
            max-height: 300px;
            border-radius: 6px;
            margin-top: 4px;
        }

        .unsupported {
            color: #72767d;
            font-style: italic;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 2px;
            font-size: 13px;
        }
    </style>
</body>

</html>
